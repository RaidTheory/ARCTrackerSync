<!doctype html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>ARCTracker Sync</title>
  <style>
    /* Tokens mirror apps/web/src/app/globals.css (.dark theme) so this page
       matches arctracker.io exactly. oklch is supported by every modern
       browser the OAuth flow returns through. */
    :root {
      --background: oklch(0.12 0.015 230);
      --card: oklch(0.16 0.015 230);
      --foreground: oklch(0.95 0.01 230);
      --muted-foreground: oklch(0.65 0.01 240);
      --primary: oklch(0.85 0.22 85);
      --primary-foreground: oklch(0.12 0.01 240);
      --border: oklch(0.22 0.01 240);
      --radius: 0.5rem;
      --accent: var(--primary);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; height: 100%; }

    body {
      background:
        radial-gradient(1100px 520px at 50% -10%, color-mix(in oklch, var(--accent) 12%, transparent), transparent 60%),
        var(--background);
      color: var(--foreground);
      font-family: "Geist", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 8px);
      padding: 40px 36px 36px;
      text-align: center;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.03) inset;
    }

    .brand { margin-bottom: 28px; min-height: 34px; }
    .brand img { height: 34px; width: auto; display: inline-block; }

    /* Offline-safe wordmark — revealed only if the logo image fails to load. */
    .wordmark {
      display: none;
      align-items: baseline;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0.2px;
      line-height: 1;
      color: var(--foreground);
      white-space: nowrap;
    }
    .wordmark .accent { color: var(--accent); }

    .icon {
      width: 76px;
      height: 76px;
      margin: 4px auto 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in oklch, var(--accent) 14%, transparent);
      border: 1px solid color-mix(in oklch, var(--accent) 38%, transparent);
    }
    .icon svg {
      width: 38px;
      height: 38px;
      stroke: var(--accent);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--foreground);
    }

    p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted-foreground);
    }

    .rule {
      height: 3px;
      width: 44px;
      margin: 28px auto 0;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="brand">
      <img
        src="https://arctracker.io/cdn-cgi/image/width=256/images/logos/logo_full.png"
        alt="ARCTracker"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';"
      />
      <span class="wordmark">ARC<span class="accent">Tracker</span></span>
    </div>

    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11" /></svg>
    </div>

    <h1>{{TITLE}}</h1>
    <p>{{BODY}}</p>

    <div class="rule" aria-hidden="true"></div>
  </main>
</body>
</html>
